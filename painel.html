<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel Industrial Desmontagem</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  background:#0f172a;
  color:white;
  font-family:Arial;
  margin:0;
}

header {
  background:#020617;
  padding:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:relative;
}

#titulo1 { font-size:23px; }

#hamburger {
  font-size:30px;
  cursor:pointer;
  margin-right:20px;
}

.menu {
  position:absolute;
  top:60px;
  left:20px;
  background:#1e293b;
  border-radius:8px;
  display:none;
  flex-direction:column;
  padding:10px;
  gap:10px;
}

.menu button {
  padding:8px 12px;
  border:none;
  border-radius:5px;
  background:#334155;
  color:white;
  cursor:pointer;
}

.topbar {
  background:#1e293b;
  padding:10px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
}

.dashboard {
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:20px;
  padding:20px;
}

.card {
  padding:12px;
  margin:10px 0;
  border-radius:8px;
  background:#1e293b;
  transition: transform 0.2s;
}

.card:hover {
  transform: translateY(-3px);
}

.status {
  padding:4px 10px;
  border-radius:5px;
  font-weight:bold;
}

.planejado {background:#3b82f6;}
.andamento {background:#facc15;color:black;}
.inspecao {background:#ef4444;}
.concluido {background:#22c55e;}

.alerta {
  background:#ef4444;
  color:white;
  padding:8px;
  border-radius:6px;
  font-weight:bold;
  margin-top:5px;
  text-align:center;
}

.aprovado {color:#22c55e; font-weight:bold;}

.maquina {
  padding:15px;
  border-radius:8px;
  margin-bottom:15px;
  text-align:center;
  color:white;
}

.maquina-animacao {
  width:60px;
  height:60px;
  margin:auto;
  border-radius:50%;
  background:green;
  animation:rodar 3s linear infinite;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:40px;
}

@keyframes rodar{
  0%{transform:rotate(0deg);}
  100%{transform:rotate(360deg);}
}

textarea {
  width:100%;
  height:50px;
  border-radius:5px;
  border:none;
  padding:5px;
  margin-top:5px;
}

button {
  padding:6px 10px;
  border:none;
  border-radius:5px;
  cursor:pointer;
  margin-top:5px;
}

.progress {
  height:25px;
  border-radius:6px;
  overflow:hidden;
  background:#334155;
  margin-bottom:5px;
}

.bar {
  height:100%;
  width:0%;
  background:#22c55e;
  transition: width 0.5s ease-in-out;
}

canvas {
  background:white;
  border-radius:6px;
  padding:10px;
}

.aguarde {
  background:#facc15;
  color:black;
  padding:10px;
  border-radius:6px;
  font-weight:bold;
  text-align:center;
  margin-top:20px;
}

.qualidade-box {
  background:#1e293b;
  padding:10px;
  border-radius:6px;
  margin-top:10px;
  text-align:center;
}

.encomenda-animada {
  font-size:20px;
  font-weight:bold;
  animation:pulseEncomenda 1.2s infinite;
}

@keyframes pulseEncomenda{
  0%{transform:scale(1);}
  50%{transform:scale(1.1);}
  100%{transform:scale(1);}
}

.card-operadores {
  padding:10px;
  border-radius:6px;
  margin-top:10px;
  text-align:center;
  border:2px solid;
}

.card-operadores h4 {
  margin:0 0 10px 0;
}

.card-operadores div {
  padding:8px 12px;
  border-radius:6px;
  margin:5px 0;
  font-weight:bold;
  background:#334155;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:5px;
}

.op-ok { color:#22c55e; background:#1e3a2f; }
.op-off { color:#94a3b8; background:#1f2937; }
</style>
</head>
<body>

<header>
  <div id="hamburger">☰</div>
  <div id="titulo1">🏭 Painel Industrial Desmontagem</div>
  <div id="clock"></div>
  
  <div class="menu" id="menuBox">
    <button onclick="trocarBox('Box 1')">Box 1</button>
    <button onclick="trocarBox('Box 2')">Box 2</button>
    <button onclick="trocarBox('Box 3')">Box 3</button>
  </div>
</header>

<div class="topbar">
  <label>Encomenda</label>
  <input id="encomenda" placeholder="*****">

  <label>Operador</label>
  <select id="operador">
    <option>Leonardo F</option>
    <option>Rafael</option>
    <option>Claudio</option>
    <option>Renato</option>
    <option>Leonardo</option>
  </select>

  <button onclick="salvarEncomenda()">Salvar</button>
  <span id="displayEncomenda"></span>
</div>

<div class="dashboard">
  <div>
    <div class="maquina" id="maquinaBox"></div>
    <div id="lista"></div>
  </div>

  <div>
    <h3>Progresso</h3>
    <div class="progress"><div class="bar" id="bar"></div></div>
    <p id="percent">0%</p>
    <div id="expedicao"></div>
    <button onclick="resetSistema()">Reset Produção</button>

    <h3>Evolução da Produção</h3>
    <canvas id="grafico"></canvas>

    <div class="aguarde">Aguardando Qualidade</div>

    <div class="qualidade-box">
      <label>Selecionar Inspetor</label>
      <select id="inspetor">
        <option>Ozeni</option>
        <option>João</option>
        <option>Airton</option>
        <option>Fernando</option>
      </select>
    </div>

    <div class="card-operadores" id="cardOperadores">
      <h4>Operadores Qualificados</h4>
      <div id="listaOperadores"></div>
    </div>

    <h3>Histórico de Produção</h3>
    <div id="historico"></div>
  </div>
</div>

<script>
// Hamburger
const hamburger=document.getElementById('hamburger');
const menu=document.getElementById('menuBox');
hamburger.onclick=()=>{ menu.style.display=menu.style.display==='flex'?'none':'flex'; menu.style.flexDirection='column'; };

// Máquinas e processos
let maquinas={ "Box 1": JSON.parse(JSON.stringify([
  {nome:"Radiador",status:"Planejado",operador:"",qualidade:false,inspetor:"",pendencia:"",inicio:null,fim:null},
  {nome:"Tubulação",status:"Planejado",operador:"",qualidade:false,inspetor:"",pendencia:"",inicio:null,fim:null},
  {nome:"Flanges",status:"Planejado",operador:"",qualidade:false,inspetor:"",pendencia:"",inicio:null,fim:null},
  {nome:"Bucha",status:"Planejado",operador:"",qualidade:false,inspetor:"",pendencia:"",inicio:null,fim:null},
  {nome:"Caneco",status:"Planejado",operador:"",qualidade:false,inspetor:"",pendencia:"",inicio:null,fim:null},
  {nome:"Conservador",status:"Planejado",operador:"",qualidade:false,inspetor:"",pendencia:"",inicio:null,fim:null}
]))};

maquinas["Box 2"]=JSON.parse(JSON.stringify(maquinas["Box 1"]));
maquinas["Box 3"]=JSON.parse(JSON.stringify(maquinas["Box 1"]));

let historicos={"Box 1":[],"Box 2":[],"Box 3":[]};
const operadores=["Leonardo F","Rafael","Claudio","Renato","Leonardo"];
let boxAtual="Box 1";

// Render e troca Box
function trocarBox(box){ boxAtual=box; render(); }

// Render painel
function render(){
  const lista=document.getElementById("lista");
  const maquinaBox=document.getElementById("maquinaBox");
  const bar=document.getElementById("bar");
  const cardOperadores=document.getElementById("cardOperadores");

  let corMaquina=boxAtual==="Box 1"?"#22c55e":boxAtual==="Box 2"?"#f97316":"#3b82f6";
  maquinaBox.style.background=corMaquina;
  maquinaBox.innerHTML=`<h3>${boxAtual} em Desmontagem</h3><div class="maquina-animacao">🕒</div>`;

  bar.className="bar"; // mantém a barra verde
  cardOperadores.className="card-operadores";

  lista.innerHTML="";
  maquinas[boxAtual].forEach((p,i)=>{
    let classe="planejado";
    if(p.status=="Andamento") classe="andamento";
    if(p.status=="Inspeção") classe="inspecao";
    if(p.status=="Concluído") classe="concluido";
    let tempo="";
    if(p.inicio && p.fim) tempo="Tempo: "+Math.round((p.fim - p.inicio)/1000)+"s";

    lista.innerHTML+=`
    <div class="card" style="background:#111827;">
      <strong>${p.nome}</strong>
      <div class="status ${classe}">${p.status}</div>
      Operador: ${p.operador || "-"}<br>
      Qualidade: ${p.qualidade ? "<span class='aprovado'>✔ Aprovado por "+p.inspetor+"</span>" : "Pendente"}<br>
      ${tempo}
      ${p.pendencia ? "<div class='alerta'>⚠ PENDÊNCIA: "+p.pendencia+"</div>" : ""}
      <br>
      <button onclick="mostrarPendencia(${i})">Registrar Pendência</button>
      <div id="areaPend${i}" style="display:none">
        <textarea id="pend${i}">${p.pendencia}</textarea>
        <button onclick="salvarPendencia(${i})">Salvar Pendência</button>
        <button onclick="resetPendencia(${i})">Reset Pendência</button>
      </div>
      <br>
      <button onclick="iniciar(${i})">Iniciar</button>
      <button onclick="mudar(${i},'Inspeção')">Inspecionar</button>
      <button onclick="aprovar(${i})">Aprovar Qualidade</button>
      <button onclick="mudar(${i},'Concluído')">Concluir</button>
    </div>`;
  });

  progresso();
  graficoUpdate();
  renderOperadores();
}

// Funções
function resetPendencia(i){ maquinas[boxAtual][i].pendencia=""; render(); }
function resetSistema(){ 
  maquinas[boxAtual].forEach(p=>{
    p.status="Planejado";
    p.operador="";
    p.qualidade=false;
    p.inspetor="";
    p.pendencia="";
    p.inicio=null;
    p.fim=null;
  }); 
  document.getElementById("bar").style.width="0%"; 
  document.getElementById("percent").innerText="0%"; 
  document.getElementById("expedicao").innerHTML=""; 
  document.getElementById("displayEncomenda").innerHTML=""; 
  historicos[boxAtual]=[]; 
  document.getElementById("historico").innerHTML=""; 
  render();
}
function iniciar(i){ 
  let operador=document.getElementById("operador").value; 
  maquinas[boxAtual][i].operador=operador; 
  maquinas[boxAtual][i].status="Andamento"; 
  maquinas[boxAtual][i].inicio=new Date(); 
  render();
}
function mudar(i,status){ 
  maquinas[boxAtual][i].status=status; 
  if(status=="Concluído") maquinas[boxAtual][i].fim=new Date(); 
  render();
}
function aprovar(i){ 
  let insp=document.getElementById("inspetor").value; 
  maquinas[boxAtual][i].qualidade=true; 
  maquinas[boxAtual][i].inspetor=insp; 
  render();
}
function mostrarPendencia(i){let area=document.getElementById("areaPend"+i); area.style.display=area.style.display==="none"?"block":"none";}
function salvarPendencia(i){let texto=document.getElementById("pend"+i).value; maquinas[boxAtual][i].pendencia=texto; render();}

function progresso(){
  let total = maquinas[boxAtual].length;
  let done = maquinas[boxAtual].filter(p => p.status=="Concluído").length;
  let percent = Math.round((done/total)*100);
  
  document.getElementById("bar").style.width = percent + "%";
  document.getElementById("percent").innerText = percent + "% concluído";

  if(done === total){
    document.getElementById("expedicao").innerHTML = "<div style='background:#22c55e;padding:10px;border-radius:6px;font-weight:bold'>✔ LIBERADO PARA EXPEDIÇÃO</div>";
    
    let encomenda = document.getElementById("encomenda").value;
    if(encomenda){ 
      historicos[boxAtual].push({
        encomenda: encomenda,
        box: boxAtual,
        data: new Date().toLocaleString()
      });
      renderHistorico();
    }
  }
}

function renderHistorico(){
  const h = document.getElementById("historico");
  h.innerHTML = "";
  historicos[boxAtual].forEach(e => {
    h.innerHTML += `<div class="card">📦 Encomenda ${e.encomenda} | ${e.box}<br>${e.data}</div>`;
  });
}

function renderOperadores(){
  const lista=document.getElementById("listaOperadores");
  lista.innerHTML="";
  operadores.forEach(op=>{
    let ativo=maquinas[boxAtual].some(p=>p.operador===op);
    lista.innerHTML+=`<div class="${ativo?'op-ok':'op-off'}">${ativo?'✔':'⬜'} ${op}</div>`;
  });
}

function salvarEncomenda(){
  let v=document.getElementById("encomenda").value;
  document.getElementById("displayEncomenda").innerHTML="<span class='encomenda-animada'> ENCOMENDA "+v+" | "+boxAtual+"</span>";
}

// Clock
function clock(){document.getElementById("clock").innerText=new Date().toLocaleTimeString();}
setInterval(clock,1000);

// Gráfico
const ctx=document.getElementById("grafico");
const chart=new Chart(ctx,{
  type:"bar",
  data:{ labels:["Radiador","Tubulação","Flanges","Bucha","Caneco","Conservador"],
         datasets:[{label:"Evolução da Produção (%)",data:[0,0,0,0,0,0],borderWidth:1,backgroundColor:'#22c55e'}]},
  options:{ scales:{ y:{ beginAtZero:true,max:100 } } }
});
function graficoUpdate(){
  chart.data.datasets[0].data = maquinas[boxAtual].map(p=>{
    if(p.status=="Planejado") return 0;
    if(p.status=="Andamento") return 40;
    if(p.status=="Inspeção") return 70;
    if(p.status=="Concluído") return 100;
  });
  chart.update();
}

render();
</script>

</body>
</html>
